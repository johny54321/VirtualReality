<html>
  <head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="script.js"></script>
    <script src="wall.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <image src="stone_brick.jpg" id="wall"/>
      </a-assets>
      <a-assets>
        <image src="grass.webp" id="grass"/>
      </a-assets>
      <a-plane src="#grass" position="0 0 0" rotation="-90 0 0" width="150" height="150" color="#AAFFAA" repeat="20 20"></a-plane>
      
      <a-entity id="tree">
        <a-cylinder position="0 0 0" height="3" radius=".75" color="brown"></a-cylinder>
        <a-cone position="0 1.5 0" height="1.5" radius-bottom="2"  radius-top="0.1" color="white"></a-cone>
        <a-cone position="0 2.5 0" height="1.5" radius-bottom="1.7"  radius-top="0.1" color="white"></a-cone>
        <a-cone position="0 3.5 0" height="1.5" radius-bottom="1.4"  radius-top="0.1" color="white"></a-cone>
        <a-cone position="0 4.5 0" height="1.5" radius-bottom="1.1"  radius-top="0.1" color="white"></a-cone>
        <a-cone position="0 5.5 0" height="1.5" radius-bottom="0.9"  radius-top="0.1" color="white"></a-cone>
        <a-cone position="0 6.5 0" height="1.5" radius-bottom="0.7"  radius-top="0.1" color="white"></a-cone>
      </a-entity>
      
      <a-sky color="blue"></a-sky>
      <a-camera position="0 15.3 0"> 
      </a-camera>
</html>
