<html>
  <head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="script.js"></script>
    <script src="wall.js"></script>
    <script src="tree.js"></script>
    <script src="house.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <image src="stone_brick.jpg" id="wall"/>
      </a-assets>
      <a-assets>
        <image src="door.webp" id="door"/>
      </a-assets>
      <a-assets>
        <image src="stone_brick2.jpg" id="roof"/>
      </a-assets>
      <a-assets>
        <image src="grass.webp" id="grass"/>
      </a-assets>
      <a-plane src="#grass" position="0 0 0" rotation="-90 0 0" width="350" height="350" color="#AAFFAA" repeat="20 20"></a-plane>
      
      
      <a-entity class="plain_wall" id="House" position="70 0 0" rotation="0 0 0">
        <a-entity class="room">
            <a-entity class="wall">
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 1.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 1.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 .5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 .5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="0 0.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="0 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" color="blue" opacity="0.2" position="0 1.5 0" ></a-box>
            </a-entity>
            <a-entity class="wall" rotation="0 90 0" position="3 0 3">
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 1.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 1.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 .5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 .5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="0 0.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="0 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" color="blue" opacity="0.2" position="0 1.5 0" ></a-box>
            </a-entity>
            <a-entity class="wall" rotation="0 90 0" position="-3 0 3">
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 1.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 1.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 .5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 .5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="0 0.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="0 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" color="blue" opacity="0.2" position="0 1.5 0" ></a-box>
            </a-entity>
            <a-entity class="wall" position="0 0 6">
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 1.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 1.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 .5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 .5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="-2 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="2 2.5 0" ></a-box>
                <a-box width="2" height="1" depth="0.1" src="#wall" position="0 2.5 0" ></a-box>             
                <a-box width="2" height="2" depth="0.1" src="#door" color="gray" position="0 1 0" ></a-box>
            </a-entity>
            <a-entity class="roof" color="gray">
              <a-cylinder segments-radial="3" scale="4 6.5 2" repeat="5 5" color="gray" src="#roof" position="0 4 3" rotation="270 0 0"></a-cylinder>
            </a-entity>
            <a-entity class="floor">
              <a-box width="2" height="1" src="#roof" color="gray" depth="0.1" repeat="5 5" src="#wall" scale="3 6 1" position="0 0 3" rotation="90 0 0" ></a-box>
            </a-entity>
            <a-entity class="bed">
              <a-box position="0 0 1.4" color="gray" scale="1.5 1 2.7"></a-box>
              <a-box position="0 .1 1.4" color="red" scale="1.3 1 2.4"></a-box>
              <a-box position="0 .5 .6" color="white" scale="1.2 .5 .5"></a-box>
            </a-entity>
            <a-entity class="bed">
              <a-box position="1.25 .1 .5" color="gray" scale="1 1.5 1"></a-box>
              <a-box position="-1.25 .1 .5" color="gray" scale="1 1.5 1"></a-box>
              <a-box position="1.25 .5 1" color="white" scale=".3 .1 .1"></a-box>
              <a-box position="-1.25 .5 1" color="white" scale=".3 .1 .1"></a-box>
            </a-entity>
      </a-entity>
      
      <a-sky color="blue"></a-sky>
      <a-camera position="0 1.5 0"> 
      </a-camera>
</html>
